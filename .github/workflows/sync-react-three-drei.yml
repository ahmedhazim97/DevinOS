name: Sync React Three Drei

on:
  schedule:
    - cron: '0 0 * * *'   # Daily at 00:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout DevinOS
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Clone pmndrs/drei
        run: |
          git clone --depth 1 https://github.com/pmndrs/drei.git /tmp/drei

      - name: Sync README, docs, and LICENSE
        run: |
          mkdir -p .agents/skills/react-three-drei/data
          cp /tmp/drei/README.md .agents/skills/react-three-drei/data/readme.md
          cp /tmp/drei/LICENSE .agents/skills/react-three-drei/data/LICENSE
          rm -rf .agents/skills/react-three-drei/data/docs
          cp -R /tmp/drei/docs .agents/skills/react-three-drei/data/docs

      - name: Validate SKILL.md
        run: |
          python scripts/validate-asset.py .agents/skills/react-three-drei/SKILL.md

      - name: Check for changes
        id: git-check
        run: |
          git add .agents/skills/react-three-drei/data
          git status --short
          if [ -n "$(git status --short)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "devinos-bot"
          git config user.email "devinos-bot@users.noreply.github.com"
          git commit -m "sync: update react-three-drei data from pmndrs/drei"
          git push origin main
